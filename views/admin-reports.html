<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 
<title>Signalements</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="/style.css?v=20260407-1" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background-color: #243038; }

    /* Bandeau bas : blanc avec icônes noires */
    .home-bottom-nav {
      background:
        linear-gradient(
          90deg,
          #f3f4f6 0%,
          #d1d5db 25%,
          #9ca3af 50%,
          #374151 75%,
          #111827 100%
        ) bottom / 100% 5px no-repeat,
        #ffffff !important;
    }
    .home-bottom-nav-item {
      color: #111827;
    }
    .home-bottom-nav-item:hover,
    .home-bottom-nav-item:focus-visible {
      background: rgba(0, 0, 0, 0.06);
      color: #000000;
    }
    @media (min-width: 768px) {
      .home-bottom-nav {
        border-radius: 0 !important;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner topbar-home">

    <div class="home-brand-block">
      <img src="/logo.jpeg" alt="Logo Agôn" class="home-logo">
      <p class="topbar-message">
     <strong>La vraie gloire<br> est convaincre.
  <strong>
</p>
      </p>
    </div>

    <div class="topbar-actions">
      <a href="/" class="back-link">← Retour aux débats</a>
      <span id="admin-badge" class="admin-badge" style="display:none;">Mode admin activé</span>
      <button id="admin-login-btn" class="admin-icon" type="button" title="Mode admin">
        <i class="fa-solid fa-gear"></i>
      </button>
      <button id="admin-logout-btn" class="button admin-exit-btn" type="button" style="display:none;">Quitter le mode admin</button>
    </div>

  </div>
</header>

<main class="container home-page">
  <section class="debates-section">
   <div class="section-header section-header-home" style="display:flex; align-items:center; justify-content:space-between;">
  <div>
    <h3 style="color:#ffffff;">Signalements</h3>
  </div>
  <button class="delete-button" type="button" onclick="deleteAllReports()">
    <i class="fa-solid fa-trash"></i> Tout supprimer
  </button>
</div>

<section id="admin-visits-stats" class="debates-list">
  <article class="debate-card">
    <div class="debate-card-category">Statistiques du jour</div>
    <h2>Visiteurs aujourd’hui</h2>
    <p><strong id="total-visits-today">0</strong> visite(s)</p>
    <p><strong id="unique-visitors-today">0</strong> visiteur(s) unique(s)</p>
  </article>
</section>

<section id="reports-list" class="debates-list"></section>
  </section>
</main>

<script src="/script.js?v=20260407-1"></script>

<!-- Modale liens externes -->
<div id="ext-link-overlay" style="display:none; position:fixed; inset:0; z-index:20000; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px);">
  <div style="position:absolute; inset:0; background:#243038; display:flex; flex-direction:column;">
    <div id="ext-link-topbar" style="display:flex; align-items:center; gap:10px; padding:8px 14px; flex-shrink:0; border-bottom:1px solid rgba(255,255,255,0.1); background:#1a272f;">
      <img src="/favicon.png" alt="Agôn" style="height:32px; width:auto; display:block; flex-shrink:0;">
      <span id="ext-link-domain" style="font-size:13px; font-weight:700; color:#a0b0bb; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
      <button onclick="closeExtPanel()" style="display:flex; align-items:center; gap:8px; border:none; background:rgba(255,255,255,0.10); color:#e8e8e8; font-size:13px; font-weight:700; padding:7px 14px; border-radius:999px; cursor:pointer; flex-shrink:0;" title="Fermer">← Retour vers Agôn</button>
    </div>
    <iframe id="ext-link-iframe" src="" style="flex:1; border:none; width:100%; background:#fff;"></iframe>
  </div>
</div>
<script>
(function() {
  function openExtPanel(url) {
    var overlay = document.getElementById('ext-link-overlay');
    var iframe = document.getElementById('ext-link-iframe');
    var favicon = document.getElementById('ext-link-favicon');
    var domain = document.getElementById('ext-link-domain');
    var openLink = document.getElementById('ext-link-open');
    if (!overlay || !iframe) return;
    try {
      var parsed = new URL(url);
      var host = parsed.hostname;
      domain.textContent = host;
  
    } catch(e) {
      domain.textContent = url;
      favicon.style.display = 'none';
    }
    openLink.href = url;
    iframe.src = url;
    overlay.style.display = 'flex';
    overlay.style.flexDirection = 'column';
    document.body.style.overflow = 'hidden';
  }

  function closeExtPanel() {
    var overlay = document.getElementById('ext-link-overlay');
    var iframe = document.getElementById('ext-link-iframe');
    if (!overlay || !iframe) return;
    overlay.style.display = 'none';
    iframe.src = '';
    document.body.style.overflow = '';
  }

  window.closeExtPanel = closeExtPanel;

  document.addEventListener('click', function(e) {
    var link = e.target.closest('a[target="_blank"]');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href || href.startsWith('/') || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
    e.preventDefault();
    openExtPanel(href);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeExtPanel();
  });
})();
</script>
</body>
</html>
