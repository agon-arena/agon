<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Notifications</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="/style.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="page-notifications page-notifications-mobile">
<header class="topbar">
  <div class="container topbar-inner topbar-home">

    <div class="home-brand-block">
      <button id="admin-login-btn" class="admin-icon" type="button" title="Mode admin">
        <i class="fa-solid fa-gear"></i>
      </button>

      <img src="/logo.jpeg" alt="Logo Agôn" class="home-logo">

      <p class="topbar-message">
         <strong>La vraie gloire<br> est convaincre.
  <strong>
      </p>
    </div>

    <div class="topbar-actions">
      <div class="back-notifications-stack">
  <button
    type="button"
    class="mobile-back-button"
    onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='/' }"
    aria-label="Revenir à la page précédente"
  >
    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <div class="debate-nav-row">
    <a href="javascript:history.back()" class="back-link">← Retour</a>
</div>

        <div class="admin-controls-row" data-admin style="display:none;">
          <span id="admin-badge" class="admin-badge">Mode admin activé</span>

          <button id="admin-logout-btn" class="button admin-exit-btn" type="button">
            Quitter le mode admin
          </button>

          <a class="button button-secondary admin-reports-button" href="/admin-reports">
            Signalements
            <span id="reports-count" class="notifications-count" style="display:none;"></span>
          </a>
        </div>
      </div>
    </div>

  </div>
</header>

<main class="container home-page">
  <section class="debates-section">
    <div class="section-header section-header-home">
      <div>
        <h3>Notifications</h3>
      </div>
    </div>
<div class="notifications-reset-wrap">
  <button id="reset-notifications-btn" class="button button-secondary">
    Tout marquer comme lu
  </button>
</div>

    <section id="notifications-page-list" class="notifications-page-list"></section>
  </section>
</main>


<nav class="home-bottom-nav" aria-label="Navigation principale mobile">
  <a href="/" class="home-bottom-nav-item" aria-label="Explorer">
    <i class="fa-regular fa-compass"></i>
    <span>Explorer</span>
  </a>

  <a href="/create" class="home-bottom-nav-item" aria-label="Ouvrir une arène">
    <i class="fa-solid fa-plus"></i>
    <span>Créer</span>
  </a>

  <div class="home-bottom-nav-item-wrap">
    <button
      type="button"
      class="home-bottom-nav-item"
      aria-label="Partager"
      aria-haspopup="true"
      aria-expanded="false"
      onclick="toggleHomeBottomShareMenu(event)"
    >
      <i class="fa-solid fa-share-nodes"></i>
      <span>Partager</span>
    </button>

    <div
      id="home-bottom-share-menu"
      class="home-bottom-share-menu"
      onclick="event.stopPropagation()"
      aria-label="Options de partage"
    >
      <button type="button" onclick="handleHomeBottomShareAction(event, copyDebateLink)">
        <i class="fa-solid fa-link"></i>
        <span>Copier le lien</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareOnX)">
        <i class="fa-brands fa-x-twitter"></i>
        <span>X</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareOnFacebook)">
        <i class="fa-brands fa-facebook-f"></i>
        <span>Facebook</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareOnWhatsApp)">
        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareByEmail)">
        <i class="fa-solid fa-envelope"></i>
        <span>Email</span>
      </button>
    </div>
  </div>

  <a href="/notifications" class="home-bottom-nav-item home-bottom-nav-item-active" aria-label="Notifications">
    <i class="fa-regular fa-bell"></i>
    <span>Alertes</span>
  </a>
</nav>

<script src="/script.js"></script>
</body>
</html>
