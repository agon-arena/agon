      background: #2e3d47;
      border-color: #3a4a55;
    }
    .page-notifications .notification-title,
    .page-notifications-mobile .notification-title {
      color: #e8e8e8;
    }
    .page-notifications .notification-subtitle,
    .page-notifications-mobile .notification-subtitle {
      color: #a0b0bb;
    }
    .page-notifications .notification-date,
    .page-notifications-mobile .notification-date {
      color: #7a8a94;
    }
    .page-notifications .notification-item-unread,
    .page-notifications-mobile .notification-item-unread {

      border-left-color: #3b82f6;
    }
    .page-notifications .notification-item-unread:hover,
    .page-notifications-mobile .notification-item-unread:hover {

    }

    /* Si la modale iframe débat existe encore pendant la transition,

    html.notifications-embedded body.page-notifications #debate-iframe-modal-close,
    html.notifications-embedded body.page-notifications-mobile #debate-iframe-modal-close {
      display: none !important;
    }

<!-- QR Code Modal -->
<div id="qrcode-modal" style="display:none; position:fixed; inset:0; z-index:10000; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;" onclick="closeQRModal()">
  <div style="background:#fff; border-radius:20px; padding:32px 28px; text-align:center; max-width:300px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3);" onclick="event.stopPropagation()">
    <h3 style="margin:0 0 20px; font-size:18px; font-weight:700; color:#111;">Scanner pour partager</h3>
    <div id="qrcode-container" style="display:flex; justify-content:center;"></div>
    <p id="qrcode-url" style="font-size:11px; color:#94a3b8; margin:14px 0 0; word-break:break-all; line-height:1.4;"></p>
    <button onclick="closeQRModal()" style="margin-top:20px; padding:10px 28px; border:none; border-radius:12px; background:#111; color:#fff; cursor:pointer; font-size:14px; font-weight:600;">Fermer</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function showQRCode() {
  var url = window.location.href;
  var modal = document.getElementById('qrcode-modal');
  var container = document.getElementById('qrcode-container');
  var urlEl = document.getElementById('qrcode-url');
  container.innerHTML = '';
  new QRCode(container, {
    text: url,
    width: 200,
    height: 200,
    colorDark: '#111111',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
  urlEl.textContent = url;
  modal.style.display = 'flex';
}
function closeQRModal() {
  document.getElementById('qrcode-modal').style.display = 'none';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeQRModal();
});
</script>

<script src="/script.js?v=20260422-2"></script>
<script>
(function() {
  function notifyParentIframePageContext() {
    if (window.self === window.top) return;
    try {
      window.parent.postMessage({ type: "agon:iframe-page-context", page: "notifications" }, "*");
    } catch (error) {}
  }

  notifyParentIframePageContext();
  window.addEventListener('load', notifyParentIframePageContext);
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) notifyParentIframePageContext();
  });
})();
</script>

<!-- Modale liens externes -->
<div id="ext-link-overlay" style="display:none; position:fixed; inset:0; z-index:20000; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px);">
  <div style="position:absolute; inset:0; background:#243038; display:flex; flex-direction:column;">
    <div id="ext-link-topbar" style="display:flex; align-items:center; gap:10px; padding:8px 14px; flex-shrink:0; border-bottom:1px solid rgba(255,255,255,0.1); background:#1a272f;">
      <img src="/favicon.png" alt="Agôn" style="height:32px; width:auto; display:block; flex-shrink:0;">
      <span id="ext-link-domain" style="font-size:13px; font-weight:700; color:#a0b0bb; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
      <button onclick="closeExtPanel()" style="display:flex; align-items:center; gap:8px; border:none; background:rgba(255,255,255,0.10); color:#e8e8e8; font-size:13px; font-weight:700; padding:7px 14px; border-radius:999px; cursor:pointer; flex-shrink:0;" title="Fermer">← Retour vers Agôn</button>
    </div>
    <iframe id="ext-link-iframe" src="" style="flex:1; border:none; width:100%; background:#fff;"></iframe>
  </div>
</div>
<script>
(function() {
  function openExtPanel(url) {
    var overlay = document.getElementById('ext-link-overlay');
    var iframe = document.getElementById('ext-link-iframe');
    var favicon = document.getElementById('ext-link-favicon');
    var domain = document.getElementById('ext-link-domain');
    var openLink = document.getElementById('ext-link-open');
    if (!overlay || !iframe) return;
    try {
      var parsed = new URL(url);
      var host = parsed.hostname;
      domain.textContent = host;
  
    } catch(e) {
      domain.textContent = url;
      favicon.style.display = 'none';
    }
    openLink.href = url;
    iframe.src = url;
    overlay.style.display = 'flex';
    overlay.style.flexDirection = 'column';
    document.body.style.overflow = 'hidden';
  }

  function closeExtPanel() {
    var overlay = document.getElementById('ext-link-overlay');
    var iframe = document.getElementById('ext-link-iframe');
    if (!overlay || !iframe) return;
    overlay.style.display = 'none';
    iframe.src = '';
    document.body.style.overflow = '';
  }

  window.closeExtPanel = closeExtPanel;

  document.addEventListener('click', function(e) {
    var link = e.target.closest('a[target="_blank"]');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href || href.startsWith('/') || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
    e.preventDefault();
    openExtPanel(href);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeExtPanel();
  });
})();
</script>
