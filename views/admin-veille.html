<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Veille → Agôn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 16px; background: #f7f7f7; color: #111; }
    h1 { margin-bottom: 4px; }
    .intro { color: #555; margin-bottom: 28px; font-size: 0.9rem; }
    #content { display: none; }
    .refresh-btn { float: right; margin-bottom: 16px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 999px; background: white; cursor: pointer; font: inherit; font-size: 0.85rem; }
    .pending-item { background: white; border: 1px solid #e0e0e0; border-radius: 14px; padding: 20px 24px; margin-bottom: 20px; }
    .pending-meta { font-size: 0.78rem; color: #aaa; margin-bottom: 14px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 4px; margin-top: 12px; }
    input[type=text], textarea, select { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font: inherit; font-size: 0.9rem; }
    textarea { min-height: 70px; resize: vertical; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #111; }
    .actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-publish { background: #111; color: white; border: none; border-radius: 999px; padding: 10px 22px; font: inherit; font-weight: 700; cursor: pointer; }
    .btn-publish:hover { background: #333; }
    .btn-publish:disabled { opacity: 0.5; cursor: default; }
    .btn-delete { background: none; border: 1px solid #c0392b; color: #c0392b; border-radius: 999px; padding: 10px 18px; font: inherit; cursor: pointer; }
    .btn-delete:hover { background: #fdf0ee; }
    .empty { color: #888; text-align: center; margin-top: 60px; }
    .error { color: #c0392b; text-align: center; margin-top: 40px; }
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 12px 24px; border-radius: 999px; font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 99; }
    .toast.show { opacity: 1; }
    .similar-box { margin-top: 14px; background: #fff8e1; border: 1px solid #f0c040; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; }
    .similar-box strong { color: #b8860b; }
    .similar-box a { color: #0645ad; }
    .similar-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
    .similar-row a { flex: 1; }
    .btn-merge { background: #e67e22; color: white; border: none; border-radius: 999px; padding: 5px 13px; font: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-merge:hover { background: #d35400; }
    .btn-merge:disabled { opacity: 0.5; cursor: default; }
    .similar-checking { margin-top: 14px; font-size: 0.82rem; color: #aaa; }
  </style>
</head>
<body>
  <h1>Veille → Agôn</h1>
  <p class="intro">Arènes envoyées depuis la veille, en attente de publication.</p>

  <div id="content"></div>
  <button id="btn-new" onclick="addEmptyForm()" style="position:fixed;bottom:32px;right:24px;background:#111;color:white;border:none;border-radius:999px;padding:12px 22px;font:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.18);z-index:50;">+ Nouvelle arène</button>
  <div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  "Politique, économie et relations internationales",
  "Société, éducation et justice",
  "Sciences, technologies et environnement",
  "Culture, modes et médias",
  "Santé, corps et bien-être",
  "Sport, loisirs et passions",
  "Vie personnelle et modes de vie",
  "Espace jeunes (collégiens - lycéens)"
];

function headers() {
  return { 'Content-Type': 'application/json' };
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function readApiError(response, fallbackMessage) {
  try {
    const data = await response.json();
    return data && data.error ? data.error : fallbackMessage;
  } catch (error) {
    return fallbackMessage;
  }
}

function showContent() {
  document.getElementById('content').style.display = 'block';
}

function removePendingItem(item) {
  if (!item) return;
  item.remove();
  const list = document.getElementById('list');
  if (!list) return;
  if (!list.querySelector('.pending-item')) {
    list.innerHTML = '<p class="empty">Aucune arène en attente.</p>';
  }
}

function getPendingItemPayload(item) {
  if (!item) return { question: '', positionA: '', positionB: '', resume: '' };
  return {
    question: item.querySelector('.f-question')?.value.trim() || '',
    positionA: item.querySelector('.f-pos-a')?.value.trim() || '',
    positionB: item.querySelector('.f-pos-b')?.value.trim() || '',
    resume: item.querySelector('.f-resume')?.value.trim() || ''
  };
}

function renderSimilarResults(data, containerId, mergeContext) {
  const el = document.getElementById(containerId);
  if (!el) return;

  if (data.warning) {
    el.outerHTML = '<div style="margin-top:10px;font-size:0.82rem;color:#e67e22;" id="' + containerId + '">⚠ ' + esc(data.warning) + '</div>';
    return;
  }

  if (data.similar && data.similar.length) {
    el.outerHTML = '<div class="similar-box" id="' + containerId + '">' +
      '<strong>⚠ Débat(s) similaire(s) déjà existant(s) :</strong>' +
      '<div style="margin-top:8px;">' +
      data.similar.map(function(s) {
        const scoreLabel = typeof s.score === 'number' ? ' <span style="color:#8a6d1d;font-size:0.78rem;">(' + Math.round(s.score * 100) + '%)</span>' : '';
        const typeLabel = s.type === 'open' ? 'Arène libre' : 'Arène à positions';
        return '<div class="similar-row">' +
          '<a href="/debates/' + esc(String(s.id)) + '" target="_blank">' + esc(s.question) + scoreLabel + '<div style="font-size:0.75rem;color:#8a6d1d;margin-top:2px;">' + typeLabel + '</div></a>' +
          '<button class="btn-merge" data-debate-id="' + esc(String(s.id)) + '">Fusionner</button>' +
          '</div>';
      }).join('') +
      '</div></div>';

    document.querySelectorAll('#' + containerId + ' .btn-merge').forEach(function(btn) {
      btn.addEventListener('click', function() { merge(btn, mergeContext); });
    });
    return;
  }

  el.outerHTML = '<div style="margin-top:10px;font-size:0.82rem;color:#27ae60;" id="' + containerId + '">Aucun doublon détecté.</div>';
}


async function checkMergePositions(debateId, pendingItem, options) {
  const opts = options || {};
  const response = await fetch('/api/admin/veille/check-merge-positions', {
    method: 'POST',
    headers: headers(),
    body: JSON.stringify({
      debateId: debateId,
      positionA: pendingItem.querySelector('.f-pos-a')?.value.trim() || '',
      positionB: pendingItem.querySelector('.f-pos-b')?.value.trim() || ''
    })
  });

  const data = await response.json().catch(function() { return { ok: false, error: 'Erreur serveur' }; });
  if (!response.ok || data.ok === false) {
    throw new Error(data.error || data.message || 'Fusion impossible. Vérifie les positions.');
  }

  if (!opts.silentWarning && data.verdict === 'ambiguous' && data.message) {
    toast('Attention : ' + data.message);
  }

  return data;
}

function renderLinkedDebateNotice(item) {
  if (!item || !item.linkedDebateId) return '';
  return '<div class="similar-box shared-debate-notice" style="margin-top:12px;background:#eef6ff;border-color:#9dc3f7;color:#234;">' +
    '<strong style="color:#1f5fa8;">Débat partagé sélectionné</strong>' +
    '<div style="margin-top:6px;font-size:0.82rem;">Cette carte restera distincte et publiera dans le même espace de débat.' +
    ' <a href="/debates/' + esc(String(item.linkedDebateId)) + '" target="_blank">Ouvrir l’arène liée</a></div>' +
    '</div>';
}

function renderStoryManualPicker(selection) {
  const selectedId = esc(selection && selection.manualStoryId || '');
  const summary = esc(selection && selection.manualStorySummary || '');
  return '<div class="story-manual-picker" style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(0,0,0,0.08);">' +
    '<label style="display:block;margin-top:0;">Choisir manuellement une autre histoire existante</label>' +
    '<select class="story-manual-select" style="width:100%;margin-top:6px;">' +
      '<option value="">Conserver le rattachement proposé</option>' +
    '</select>' +
    '<div class="story-manual-summary" style="margin-top:10px;' + (selectedId ? '' : 'display:none;') + '">' +
      '<label>Résumé de l’histoire choisie depuis le début</label>' +
      '<textarea class="story-manual-summary-input" rows="3" style="width:100%;margin-top:6px;">' + summary + '</textarea>' +
      '<div class="story-manual-meta" style="margin-top:6px;font-size:0.8rem;color:#666;"></div>' +
    '</div>' +
  '</div>';
}

function renderStorySelectionNotice(item) {
  const selection = item && item.storySelection;
  if (!selection || typeof selection !== 'object') return '';

  const matchedTitle = esc(selection.matchedStoryTitle || '');
  const existingSummary = esc(selection.storySummary || '');
  const newStoryTitle = esc(selection.newStory && selection.newStory.story_title || '');
  const newStorySummary = esc(selection.newStory && selection.newStory.story_summary || '');
  const reason = esc(selection.reason || '');
  const manualPicker = renderStoryManualPicker(selection);

  if (selection.selectionMode === 'existing' && matchedTitle) {
    return '<div class="similar-box story-selection-box" data-story-selection-mode="existing" style="margin-top:12px;background:#eef9f1;border-color:#9fd4b5;color:#1f3b2d;">' +
      '<strong style="color:#26734d;">Histoire liée</strong>' +
      '<div style="margin-top:6px;font-size:0.88rem;"><strong>' + matchedTitle + '</strong></div>' +
      (reason ? '<div style="margin-top:4px;font-size:0.8rem;color:#496756;">' + reason + '</div>' : '') +
      '<label style="margin-top:8px;">Résumé de l’histoire depuis le début</label>' +
      '<textarea class="story-summary-input" rows="3" style="width:100%;margin-top:6px;">' + existingSummary + '</textarea>' +
      manualPicker +
      '</div>';
  }

  if (selection.selectionMode === 'new' && newStoryTitle) {
    return '<div class="similar-box story-selection-box" data-story-selection-mode="new" style="margin-top:12px;background:#fff8e8;border-color:#efc96d;color:#523d12;">' +
      '<strong style="color:#a06a00;">Nouvelle histoire proposée</strong>' +
      '<label style="margin-top:8px;">Titre de l’histoire</label>' +
      '<input type="text" class="story-title-input" style="width:100%;margin-top:6px;" value="' + newStoryTitle + '">' +
      '<label style="margin-top:8px;">Résumé de l’histoire depuis le début</label>' +
      '<textarea class="story-summary-input" rows="3" style="width:100%;margin-top:6px;">' + newStorySummary + '</textarea>' +
      manualPicker +
      '</div>';
  }

  if (selection.storyDecision === 'uncertain') {
    const uncertainSummary = esc(selection.storySummary || selection.newStory && selection.newStory.story_summary || '');
    return '<div class="similar-box story-selection-box" data-story-selection-mode="uncertain" style="margin-top:12px;background:#fff4f0;border-color:#f0b49b;color:#5a2c1f;">' +
      '<strong style="color:#b5532f;">Histoire à confirmer</strong>' +
      (matchedTitle ? '<div style="margin-top:6px;font-size:0.88rem;">Proposition : <strong>' + matchedTitle + '</strong></div>' : '') +
      (reason ? '<div style="margin-top:4px;font-size:0.8rem;color:#7a4a3b;">' + reason + '</div>' : '') +
      '<label style="display:block;margin-top:10px;"><input type="radio" class="story-choice-input" name="story-choice-' + item.id + '" value="existing"' + (selection.selectionMode === 'existing' ? ' checked' : '') + '> Rattacher à cette histoire existante</label>' +
      '<label style="display:block;margin-top:6px;"><input type="radio" class="story-choice-input" name="story-choice-' + item.id + '" value="new"' + (selection.selectionMode === 'new' ? ' checked' : '') + '> Créer une nouvelle histoire</label>' +
      '<div class="story-new-fields" style="margin-top:10px;' + (selection.selectionMode === 'new' ? '' : 'display:none;') + '">' +
      '<label>Titre de l’histoire</label>' +
      '<input type="text" class="story-title-input" style="width:100%;margin-top:6px;" value="' + newStoryTitle + '">' +
      '<label style="margin-top:8px;">Résumé de l’histoire depuis le début</label>' +
      '<textarea class="story-summary-input" rows="3" style="width:100%;margin-top:6px;">' + uncertainSummary + '</textarea>' +
      '</div>' +
      '<div class="story-existing-fields" style="margin-top:10px;' + (selection.selectionMode === 'existing' ? '' : 'display:none;') + '">' +
      '<label>Résumé de l’histoire depuis le début</label>' +
      '<textarea class="story-existing-summary-input" rows="3" style="width:100%;margin-top:6px;">' + existingSummary + '</textarea>' +
      '</div>' +
      manualPicker +
      '</div>';
  }

  return '';
}

function renderPreviousEpisodeButton(item) {
  const selection = item && item.storySelection;
  const url = selection && selection.previousEpisodeUrl ? String(selection.previousEpisodeUrl) : '';
  if (!url) return '';
  const title = esc(selection.previousEpisodeTitle || 'Épisode précédent');
  return '<div style="margin-top:10px;">' +
    '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;justify-content:center;padding:9px 12px;border-radius:999px;border:1px solid #d7dbe2;background:#fff;color:#223;font-size:0.84rem;font-weight:700;text-decoration:none;" title="' + title + '">Voir l’épisode précédent</a>' +
    '</div>';
}

function normalizeKeywordList(values, max) {
  const seen = new Set();
  const list = [];
  (Array.isArray(values) ? values : []).forEach(function(value) {
    const keyword = String(value || '').replace(/^[-–—•\s]+/, '').replace(/[?!.;,:\s]+$/g, '').trim();
    if (!keyword || keyword.length < 2 || keyword.length > 40) return;
    const lower = keyword.toLowerCase();
    if (seen.has(lower)) return;
    seen.add(lower);
    list.push(keyword);
  });
  return list.slice(0, max || 10);
}

function renderKeywordEditor(item) {
  const keywords = normalizeKeywordList(item && item.keywords || [], 10);
  return '<div class="keyword-editor" style="margin-top:12px;">' +
    '<div style="font-size:0.82rem;font-weight:700;color:#555;margin-bottom:6px;">Mots-clés relevés</div>' +
    '<div class="keyword-list" style="display:flex;flex-wrap:wrap;gap:8px;">' +
      keywords.map(function(keyword) {
        return '<span class="keyword-chip" data-keyword="' + esc(keyword) + '" style="display:inline-flex;align-items:center;min-height:30px;padding:0 10px;border-radius:999px;background:#f3f4f7;border:1px solid #e2e4ea;color:#2b2e38;font-size:0.82rem;font-weight:600;line-height:1.2;">' + esc(keyword) + '<button type="button" class="keyword-remove-btn" style="margin-left:8px;border:none;background:transparent;color:#666;cursor:pointer;font:inherit;font-size:0.9rem;line-height:1;padding:0;">×</button></span>';
      }).join('') +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-top:8px;">' +
      '<input type="text" class="keyword-input" style="flex:1;min-width:0;" placeholder="Ajouter un mot-clé">' +
      '<button type="button" class="keyword-add-btn">Ajouter</button>' +
    '</div>' +
  '</div>';
}

function renderItem(item) {
  const catOptions = CATEGORIES.map(function(c) {
    return '<option value="' + esc(c) + '"' + (c === item.theme ? ' selected' : '') + '>' + esc(c) + '</option>';
  }).join('');

  return '<div class="pending-item" data-id="' + item.id + '" data-linked-debate-id="' + esc(item.linkedDebateId || '') + '">' +
    '<div class="pending-meta">Reçu le ' + new Date(item.addedAt).toLocaleString('fr-FR') + '</div>' +
    '<div class="similar-checking" id="similar-' + item.id + '">Vérification des doublons…</div>' +
    renderLinkedDebateNotice(item) +
    renderStorySelectionNotice(item) +
    '<label>Question de débat</label>' +
    '<input type="text" class="f-question" maxlength="100" value="' + esc(item.question) + '">' +
    '<div class="field-counter question-counter" style="margin-top:4px;font-size:0.78rem;color:#6b7280;text-align:right;">0 / 100</div>' +
    '<label>Position A</label>' +
    '<input type="text" class="f-pos-a" value="' + esc(item.positionA || '') + '">' +
    '<label>Position B</label>' +
    '<input type="text" class="f-pos-b" value="' + esc(item.positionB || '') + '">' +
    '<label>Thématique</label>' +
    '<select class="f-theme">' + catOptions + '</select>' +
    '<label>Résumé (contexte)</label>' +
    '<textarea class="f-resume">' + esc(item.resume || '') + '</textarea>' +
    '<div class="field-counter resume-counter" style="margin-top:4px;font-size:0.78rem;color:#6b7280;text-align:right;">0 / 1800</div>' +
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;">' +
      '<button type="button" class="context-save-btn">Enregistrer les modifications</button>' +
      '<span class="context-save-feedback" style="display:none;color:#496756;font-size:0.82rem;font-weight:600;">Modifications enregistrées</span>' +
    '</div>' +
    renderKeywordEditor(item) +
    renderPreviousEpisodeButton(item) +
    '<label>Liens sources</label>' +
    (item.links && item.links.length
      ? item.links.map(function(l) {
          return '<div class="link-row" style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f0f0f0;">' +
            '<input type="checkbox" class="link-check"' + (l.checked !== false ? ' checked' : '') + ' style="flex-shrink:0;width:16px;height:16px;margin-top:3px;">' +
            '<div style="flex:1;min-width:0">' +
              '<div style="margin-bottom:3px">' +
                '<strong style="font-size:0.88rem">' + esc(l.source) + '</strong>' +
                (l.type === 'youtube' ? ' <span style="font-size:0.75rem;background:#c0392b;color:white;border-radius:4px;padding:1px 5px">YouTube</span>' : '') +
              '</div>' +
              '<a class="link-url" href="' + esc(l.url) + '" data-title="' + esc(l.title || '') + '" data-source="' + esc(l.source || '') + '" data-date="' + esc(l.date || '') + '" data-type="' + esc(l.type || 'article') + '" target="_blank" rel="noopener noreferrer" style="font-size:0.88rem;color:#0645ad;word-break:break-word;text-decoration:none;">' + esc(l.title || l.url) + '</a>' +
            '</div>' +
          '</div>';
        }).join('')
      : '<p style="color:#aaa;font-size:0.85rem">Aucun lien (envoyer depuis la veille après Générer IA)</p>'
    ) +
    '<label style="color:#aaa;font-weight:400;margin-top:8px">Médias : ' + esc(item.sources || '') + '</label>' +
    '<div class="actions">' +
    '<button class="btn-publish">Publier sur Agôn</button>' +
    '<button class="btn-delete">Supprimer</button>' +
    '</div>' +
    '</div>';
}

function updateFieldCounter(item, selector, counterSelector, maxLength) {
  if (!item) return;
  const field = item.querySelector(selector);
  const counter = item.querySelector(counterSelector);
  if (!field || !counter) return;
  const rawValue = field.value || '';
  const safeValue = rawValue.slice(0, maxLength);
  if (rawValue !== safeValue) {
    field.value = safeValue;
  }
  counter.textContent = safeValue.length + ' / ' + maxLength;
  counter.style.color = safeValue.length >= maxLength ? '#b42318' : '#6b7280';
}

function updateItemCounters(item) {
  if (!item) return;
  updateFieldCounter(item, '.f-question', '.question-counter', 100);
  updateFieldCounter(item, '.f-resume', '.resume-counter', 1800);
}

async function checkSimilar(item) {
  const el = document.getElementById('similar-' + item.id);
  if (!el) return;
  try {
    const r = await fetch('/api/admin/veille/check-similar', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({
        question: item.question,
        positionA: item.positionA || '',
        positionB: item.positionB || '',
        resume: item.resume || ''
      })
    });
    const data = await r.json();
    renderSimilarResults(data, 'similar-' + item.id, item);
  } catch(e) {
    el.textContent = '';
  }
}

let storiesCache = null;

async function loadStories() {
  if (storiesCache) return storiesCache;
  const r = await fetch('/api/veille/stories', { headers: headers() });
  if (!r.ok) throw new Error(await readApiError(r, 'Impossible de charger les histoires'));
  const data = await r.json();
  storiesCache = Array.isArray(data.stories) ? data.stories : [];
  return storiesCache;
}

function updateManualStorySelectionUi(itemEl) {
  const select = itemEl.querySelector('.story-manual-select');
  const wrap = itemEl.querySelector('.story-manual-summary');
  const input = itemEl.querySelector('.story-manual-summary-input');
  const meta = itemEl.querySelector('.story-manual-meta');
  if (!select || !wrap || !input || !meta) return;
  const option = select.options[select.selectedIndex];
  const hasValue = Boolean(select.value);
  wrap.style.display = hasValue ? '' : 'none';
  if (!hasValue) {
    meta.textContent = '';
    return;
  }
  input.value = option?.dataset.summary || input.value || '';
  meta.textContent = option?.dataset.latest ? 'Dernier épisode : ' + option.dataset.latest : '';
}

async function populateManualStoryPicker(itemEl, selection) {
  const select = itemEl.querySelector('.story-manual-select');
  if (!select || select.dataset.loaded === 'true') return;
  const stories = await loadStories();
  const currentId = String(selection && (selection.manualStoryId || '') || '');
  const options = ['<option value="">Conserver le rattachement proposé</option>'];
  stories.forEach(function(story) {
    const storyId = esc(story.story_id || '');
    const title = esc(story.story_title || 'Histoire sans titre');
    const summary = esc(story.story_summary || '');
    const latest = esc(story.latest_episode_title || '');
    const url = esc(story.latest_episode_url || '');
    options.push('<option value="' + storyId + '" data-title="' + title + '" data-summary="' + summary + '" data-latest="' + latest + '" data-url="' + url + '"' + (currentId && currentId === String(story.story_id || '') ? ' selected' : '') + '>' + title + (latest ? ' - ' + latest : '') + '</option>');
  });
  select.innerHTML = options.join('');
  select.dataset.loaded = 'true';
  updateManualStorySelectionUi(itemEl);
}

async function loadPending() {
  const el = document.getElementById('content');
  el.innerHTML = '<button class="refresh-btn" id="refresh-btn">↻ Actualiser</button><div id="list"><p style="color:#aaa;text-align:center;margin-top:40px">Chargement…</p></div>';
  document.getElementById('refresh-btn').addEventListener('click', loadPending);

  try {
    const r = await fetch('/api/admin/veille', { headers: headers() });
    if (!r.ok) throw new Error(await readApiError(r, 'Erreur serveur'));
    const items = await r.json();
    const list = document.getElementById('list');
    if (!items.length) {
      list.innerHTML = '<p class="empty">Aucune arène en attente.</p>';
      return;
    }
    list.innerHTML = items.map(renderItem).join('');
    items.forEach(function(item) {
      const el = list.querySelector('.pending-item[data-id="' + item.id + '"]');
      if (el) {
        el.storySelectionData = item.storySelection || null;
        el.querySelectorAll('.story-choice-input').forEach(function(input) {
          input.addEventListener('change', function() {
            const box = el.querySelector('.story-selection-box');
            if (!box || box.dataset.storySelectionMode !== 'uncertain') return;
            const mode = box.querySelector('.story-choice-input:checked')?.value || '';
            const newFields = box.querySelector('.story-new-fields');
            const existingFields = box.querySelector('.story-existing-fields');
            if (newFields) newFields.style.display = mode === 'new' ? '' : 'none';
            if (existingFields) existingFields.style.display = mode === 'existing' ? '' : 'none';
          });
        });
        const manualSelect = el.querySelector('.story-manual-select');
        if (manualSelect) {
          void populateManualStoryPicker(el, item.storySelection || null).catch(function(error) {
            console.error('Erreur chargement histoires :', error);
          });
          manualSelect.addEventListener('change', function() {
            updateManualStorySelectionUi(el);
          });
        }
      }
    });
    list.querySelectorAll('.pending-item').forEach(function(item) {
      updateItemCounters(item);
    });
    list.querySelectorAll('.btn-publish').forEach(function(btn) {
      btn.addEventListener('click', function() { publish(btn); });
    });
    list.querySelectorAll('.btn-delete').forEach(function(btn) {
      btn.addEventListener('click', function() { remove(btn); });
    });
    list.querySelectorAll('.context-save-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        saveContextEdits(btn.closest('.pending-item'));
      });
    });
    list.querySelectorAll('.f-question, .f-resume').forEach(function(field) {
      field.addEventListener('input', function() {
        updateItemCounters(field.closest('.pending-item'));
      });
    });
    list.querySelectorAll('.keyword-add-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const item = btn.closest('.pending-item');
        const input = item && item.querySelector('.keyword-input');
        addKeywordToEditor(item, input && input.value || '');
      });
    });
    items.forEach(function(item) { checkSimilar(item); });
  } catch(e) {
    document.getElementById('list').innerHTML = '<p class="error">Erreur : ' + e.message + '</p>';
  }
}

function collectStorySelection(item) {
  const box = item.querySelector('.story-selection-box');
  const raw = item.storySelectionData;
  if (!box || !raw) return null;

  const selection = JSON.parse(JSON.stringify(raw));
  const mode = box.dataset.storySelectionMode === 'uncertain'
    ? (box.querySelector('.story-choice-input:checked')?.value || '')
    : box.dataset.storySelectionMode;
  const manualSelect = box.querySelector('.story-manual-select');
  const manualOption = manualSelect?.options[manualSelect.selectedIndex] || null;

  if (manualSelect && manualSelect.value) {
    const manualSummary = box.querySelector('.story-manual-summary-input')?.value.trim() || '';
    selection.storyDecision = 'existing_story';
    selection.selectionMode = 'existing';
    selection.matchedStoryId = manualSelect.value;
    selection.matchedStoryTitle = manualOption?.dataset.title || '';
    selection.storySummary = manualSummary;
    selection.previousEpisodeTitle = manualOption?.dataset.latest || '';
    selection.previousEpisodeUrl = manualOption?.dataset.url || '';
    selection.reason = 'Histoire choisie manuellement.';
    selection.manualStoryId = manualSelect.value;
    selection.manualStorySummary = manualSummary;
    return selection;
  }

  if (box.dataset.storySelectionMode === 'existing') {
    selection.selectionMode = 'existing';
    selection.storySummary = box.querySelector('.story-summary-input')?.value.trim() || '';
    selection.manualStoryId = '';
    selection.manualStorySummary = '';
    return selection;
  }

  if (box.dataset.storySelectionMode === 'new') {
    selection.selectionMode = 'new';
    selection.newStory = selection.newStory || {};
    selection.newStory.story_title = box.querySelector('.story-title-input')?.value.trim() || '';
    selection.newStory.story_summary = box.querySelector('.story-summary-input')?.value.trim() || '';
    selection.manualStoryId = '';
    selection.manualStorySummary = '';
    return selection;
  }

  if (box.dataset.storySelectionMode === 'uncertain') {
    selection.selectionMode = mode;
    if (mode === 'existing') {
      selection.storySummary = box.querySelector('.story-existing-summary-input')?.value.trim() || '';
      selection.manualStoryId = '';
      selection.manualStorySummary = '';
      return selection;
    }
    if (mode === 'new') {
      selection.newStory = selection.newStory || {};
      selection.newStory.story_title = box.querySelector('.story-title-input')?.value.trim() || '';
      selection.newStory.story_summary = box.querySelector('.story-summary-input')?.value.trim() || '';
      selection.manualStoryId = '';
      selection.manualStorySummary = '';
      return selection;
    }
  }

  return selection;
}

function getKeywordsFromEditor(item) {
  return normalizeKeywordList([].slice.call(item.querySelectorAll('.keyword-chip[data-keyword]')).map(function(el) {
    return el.dataset.keyword || '';
  }), 10);
}

function addKeywordToEditor(item, value) {
  if (!item) return;
  const list = item.querySelector('.keyword-list');
  const input = item.querySelector('.keyword-input');
  if (!list) return;
  const keywords = normalizeKeywordList(getKeywordsFromEditor(item).concat([value]), 10);
  list.innerHTML = keywords.map(function(keyword) {
    return '<span class="keyword-chip" data-keyword="' + esc(keyword) + '" style="display:inline-flex;align-items:center;min-height:30px;padding:0 10px;border-radius:999px;background:#f3f4f7;border:1px solid #e2e4ea;color:#2b2e38;font-size:0.82rem;font-weight:600;line-height:1.2;">' + esc(keyword) + '<button type="button" class="keyword-remove-btn" style="margin-left:8px;border:none;background:transparent;color:#666;cursor:pointer;font:inherit;font-size:0.9rem;line-height:1;padding:0;">×</button></span>';
  }).join('');
  if (input) input.value = '';
}

function saveContextEdits(item) {
  if (!item) return;
  updateItemCounters(item);
  const question = item.querySelector('.f-question');
  const resume = item.querySelector('.f-resume');
  const feedback = item.querySelector('.context-save-feedback');
  if (question) {
    question.dataset.savedValue = question.value.trim();
  }
  if (resume) {
    resume.dataset.savedValue = resume.value.trim();
  }
  if (feedback) {
    feedback.style.display = '';
    clearTimeout(feedback._timer);
    feedback._timer = setTimeout(function() {
      feedback.style.display = 'none';
    }, 1800);
  }
}

async function publish(btn) {
  const item = btn.closest('.pending-item');
  const id = Number(item.dataset.id);
  const keywords = getKeywordsFromEditor(item);
  const links = [...item.querySelectorAll('.link-row')].filter(function(row) {
    return row.querySelector('.link-check').checked;
  }).map(function(row) {
    const a = row.querySelector('.link-url');
    return {
      url: a.href,
      title: a.dataset.title || '',
      source: a.dataset.source || '',
      date: a.dataset.date || '',
      type: a.dataset.type || 'article'
    };
  }).filter(function(l) { return l.url; });

  if (!links.length) {
    toast('Attention : sélectionne au moins une source avant de publier sur Agôn.');
    return;
  }

  const body = {
    id: id,
    question: item.querySelector('.f-question').value.trim().slice(0, 100),
    positionA: item.querySelector('.f-pos-a').value.trim(),
    positionB: item.querySelector('.f-pos-b').value.trim(),
    theme: item.querySelector('.f-theme').value,
    resume: item.querySelector('.f-resume').value.trim().slice(0, 1800),
    keywords: keywords,
    links: links,
    linkedDebateId: item.dataset.linkedDebateId || '',
    storySelection: collectStorySelection(item)
  };

  if (body.linkedDebateId) {
    try {
      const alignment = await checkMergePositions(body.linkedDebateId, item, { silentWarning: true });
      if ((alignment.verdict === 'ambiguous' || alignment.verdict === 'inverted') && alignment.message) {
        const shouldContinue = confirm(
          'Attention : ' + alignment.message + '\n\nVeux-tu continuer quand même la publication ?'
        );
        if (!shouldContinue) {
          return;
        }
        body.forcePublishOnAlignmentWarning = true;
      }
    } catch (error) {
      const shouldContinue = confirm(
        'Attention : ' + error.message + '\n\nVeux-tu continuer quand même la publication ?'
      );
      if (!shouldContinue) {
        return;
      }
      body.forcePublishOnAlignmentWarning = true;
    }
  }

  btn.disabled = true;
  btn.textContent = 'Publication…';
  try {
    const r = await fetch('/api/admin/veille/publish', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await readApiError(r, 'Erreur serveur'));
    const data = await r.json();
    toast('Débat publié ✓');
    removePendingItem(item);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Publier sur Agôn';
    toast('Erreur : ' + e.message);
  }
}

async function merge(btn, item) {
  const debateId = btn.dataset.debateId;
  const pendingItem = btn.closest('.pending-item');
  try {
    await checkMergePositions(debateId, pendingItem);
  } catch (error) {
    toast('Attention : ' + error.message);
    return;
  }
  if (!confirm('Fusionner cette arène avec le débat existant ?\n\nLes deux cartes resteront séparées. La fusion partagera seulement le même espace de débat au moment de la publication.')) return;
  btn.disabled = true;
  btn.textContent = 'Fusion…';
  const links = [...pendingItem.querySelectorAll('.link-row')].filter(function(row) {
    return row.querySelector('.link-check').checked;
  }).map(function(row) {
    const a = row.querySelector('.link-url');
    return { url: a.href, title: a.dataset.title || '', source: a.dataset.source || '', date: a.dataset.date || '', type: a.dataset.type || 'article' };
  }).filter(function(l) { return l.url; });
  try {
    const r = await fetch('/api/admin/veille/merge', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({
        id: item.id,
        debateId: debateId,
        question: pendingItem.querySelector('.f-question').value.trim().slice(0, 100),
        positionA: pendingItem.querySelector('.f-pos-a').value.trim(),
        positionB: pendingItem.querySelector('.f-pos-b').value.trim(),
        resume: pendingItem.querySelector('.f-resume').value.trim().slice(0, 1800),
        links: links
      })
    });
    if (!r.ok) throw new Error(await readApiError(r, 'Erreur serveur'));
    const data = await r.json();
    pendingItem.dataset.linkedDebateId = String(data.debateId || debateId);
    const previousNotice = pendingItem.querySelector('.shared-debate-notice');
    if (previousNotice) previousNotice.remove();
    const notice = document.createElement('div');
    notice.className = 'similar-box shared-debate-notice';
    notice.style.marginTop = '12px';
    notice.style.background = '#eef6ff';
    notice.style.borderColor = '#9dc3f7';
    notice.style.color = '#234';
    notice.innerHTML = '<strong style="color:#1f5fa8;">Débat partagé sélectionné</strong>' +
      '<div style="margin-top:6px;font-size:0.82rem;">Cette carte restera distincte et publiera dans le même espace de débat. ' +
      '<a href="/debates/' + esc(String(data.debateId || debateId)) + '" target="_blank">Ouvrir l’arène liée</a></div>';
    const similarBox = pendingItem.querySelector('.similar-box, .similar-checking, [id^="similar-"]');
    if (similarBox && similarBox.nextSibling) {
      pendingItem.insertBefore(notice, similarBox.nextSibling);
    } else {
      pendingItem.insertBefore(notice, pendingItem.querySelector('label'));
    }
    btn.disabled = false;
    btn.textContent = 'Fusionner';
    toast('Débat partagé sélectionné ✓');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Fusionner';
    toast('Erreur : ' + e.message);
  }
}

document.addEventListener('click', function(e) {
  const removeBtn = e.target.closest('.keyword-remove-btn');
  if (!removeBtn) return;
  const chip = removeBtn.closest('.keyword-chip');
  if (chip) chip.remove();
});

document.addEventListener('keydown', function(e) {
  if (!e.target.classList.contains('keyword-input')) return;
  if (e.key !== 'Enter') return;
  e.preventDefault();
  addKeywordToEditor(e.target.closest('.pending-item'), e.target.value || '');
});

function adminHeaders() {
  return { 'Content-Type': 'application/json' };
}

function buildAdminActions(debateId, pendingItem) {
  const html = '<div class="actions" id="actions-' + debateId + '" style="flex-wrap:wrap;">' +
    '<button class="btn-save-merge">Modifier et sauvegarder</button>' +
    '<button class="btn-republish-merge" style="background:none;border:1px solid #111;color:#111;border-radius:999px;padding:10px 18px;font:inherit;cursor:pointer;">Republier en haut</button>' +
    '<button class="btn-publish-agon-merge" style="background:#27ae60;color:white;border:none;border-radius:999px;padding:10px 18px;font:inherit;font-weight:700;cursor:pointer;">Sauvegarder et publier (généré par agôn)</button>' +
    '<button class="btn-delete">Annuler</button>' +
    '</div>';
  return html;
}

function wireAdminActions(debateId, pendingItem) {
  const actions = document.getElementById('actions-' + debateId);
  if (!actions) return;
  actions.querySelector('.btn-save-merge').addEventListener('click', function() { saveMerge(debateId, pendingItem, false); });
  actions.querySelector('.btn-publish-agon-merge').addEventListener('click', function() { saveMerge(debateId, pendingItem, true); });
  actions.querySelector('.btn-republish-merge').addEventListener('click', function() { republishMerge(debateId, pendingItem); });
  actions.querySelector('.btn-delete').addEventListener('click', function() { pendingItem.remove(); });
}

async function saveMerge(debateId, pendingItem, agonGenerated) {
  const btn = agonGenerated ? pendingItem.querySelector('.btn-publish-agon-merge') : pendingItem.querySelector('.btn-save-merge');
  btn.disabled = true;
  btn.textContent = 'Sauvegarde…';
  try {
    const r = await fetch('/api/admin/debate/' + debateId, {
      method: 'PUT',
      headers: adminHeaders(),
      body: JSON.stringify({
        question: pendingItem.querySelector('.f-question').value.trim(),
        option_a: pendingItem.querySelector('.f-pos-a').value.trim(),
        option_b: pendingItem.querySelector('.f-pos-b').value.trim(),
        category: pendingItem.querySelector('.f-theme').value,
        content: pendingItem.querySelector('.f-resume').value.trim(),
        ...(agonGenerated ? { mark_as_agon_generated: true } : {})
      })
    });
    if (!r.ok) throw new Error('Erreur serveur (vérifiez la connexion admin)');
    if (agonGenerated) await fetch('/api/admin/debate/' + debateId + '/bump', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({ preserve_agon_generated: true }) });
    toast(agonGenerated ? 'Publié (généré par agôn) ✓' : 'Sauvegardé ✓');
    pendingItem.remove();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = agonGenerated ? 'Sauvegarder et publier (généré par agôn)' : 'Sauvegarder';
    toast('Erreur : ' + e.message);
  }
}

async function republishMerge(debateId, pendingItem) {
  const btn = pendingItem.querySelector('.btn-republish-merge');
  btn.disabled = true;
  btn.textContent = 'Publication…';
  try {
    const r = await fetch('/api/admin/debate/' + debateId + '/bump', { method: 'POST', headers: adminHeaders(), body: JSON.stringify({}) });
    if (!r.ok) throw new Error('Erreur serveur (vérifiez la connexion admin)');
    toast('Republié en haut ✓');
    pendingItem.remove();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Republier en haut';
    toast('Erreur : ' + e.message);
  }
}

async function remove(btn) {
  const item = btn.closest('.pending-item');
  const id = Number(item.dataset.id);
  if (!confirm('Supprimer cette arène ?')) return;
  try {
    const r = await fetch('/api/admin/veille/' + id, { method: 'DELETE', headers: headers() });
    if (!r.ok) throw new Error();
    item.remove();
    toast('Supprimé.');
  } catch {
    toast('Erreur lors de la suppression.');
  }
}

function addEmptyForm() {
  const list = document.getElementById('list');
  if (!list) return;
  const tempId = Date.now();
  const catOptions = CATEGORIES.map(function(c) {
    return '<option value="' + esc(c) + '">' + esc(c) + '</option>';
  }).join('');
  const html = '<div class="pending-item" data-id="' + tempId + '" data-new="1">' +
    '<div class="pending-meta">Nouvelle arène (formulaire vide)</div>' +
    '<div style="margin-top:10px;font-size:0.82rem;color:#aaa;">Remplissez le formulaire puis publiez ou vérifiez les doublons.</div>' +
    '<label>Question de débat</label>' +
    '<input type="text" class="f-question" placeholder="Votre question…">' +
    '<label>Position A</label>' +
    '<input type="text" class="f-pos-a" placeholder="Position A…">' +
    '<label>Position B</label>' +
    '<input type="text" class="f-pos-b" placeholder="Position B…">' +
    '<label>Thématique</label>' +
    '<select class="f-theme">' + catOptions + '</select>' +
    '<label>Résumé (contexte)</label>' +
    '<textarea class="f-resume" placeholder="Contexte de l’arène…"></textarea>' +
    '<div class="actions">' +
    '<button class="btn-publish">Publier sur Agôn</button>' +
    '<button class="btn-check-similar" style="background:none;border:1px solid #e67e22;color:#e67e22;border-radius:999px;padding:10px 18px;font:inherit;cursor:pointer;">Vérifier doublons</button>' +
    '<button class="btn-delete">Supprimer</button>' +
    '</div>' +
    '<div class="similar-zone"></div>' +
    '</div>';
  list.insertAdjacentHTML('afterbegin', html);
  const card = list.querySelector('[data-id="' + tempId + '"]');
  card.querySelector('.btn-publish').addEventListener('click', function() { publish(this); });
  card.querySelector('.btn-delete').addEventListener('click', function() { card.remove(); });
  card.querySelector('.btn-check-similar').addEventListener('click', async function() {
    const q = card.querySelector('.f-question').value.trim();
    if (!q) { toast('Saisissez d\'abord une question.'); return; }
    const zone = card.querySelector('.similar-zone');
    zone.innerHTML = '<div class="similar-checking">Vérification…</div>';
    try {
      const payload = getPendingItemPayload(card);
      const r = await fetch('/api/admin/veille/check-similar', { method: 'POST', headers: headers(), body: JSON.stringify(payload) });
      const data = await r.json();
      zone.innerHTML = '<div id="similar-temp-' + tempId + '"></div>';
      renderSimilarResults(data, 'similar-temp-' + tempId, { id: tempId });
    } catch(e) { zone.innerHTML = ''; }
  });
  card.querySelector('.f-question').focus();
}

showContent();
loadPending();
</script>
