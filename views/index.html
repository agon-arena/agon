<script>
(function(){
  if (window.__agonIndexMetaCaptureInstalled) return;
  window.__agonIndexMetaCaptureInstalled = true;

  var debateMetaById = new Map();
  window.__agonIndexDebateMeta = debateMetaById;

  function toNumber(value){
    var n = Number(value);
    return Number.isFinite(n) ? n : null;
  }

  function pickIdeasCount(item){
    var candidates = [
      item && item.ideasCount,
      item && item.ideaCount,
      item && item.totalIdeas,
      item && item.argumentsCount,
      item && item.argumentCount,
      item && item.totalArguments,
      item && item.nbArguments,
      item && item.idea_count,
      item && item.ideas_count,
      item && item.arguments_count
    ];

    for (var i = 0; i < candidates.length; i++) {
      var n = toNumber(candidates[i]);
      if (n !== null) return n;
    }

    var arrCandidates = [
      item && item.ideas,
      item && item.arguments,
      item && item.allArguments,
      item && item.argumentList
    ];

    for (var j = 0; j < arrCandidates.length; j++) {
      if (Array.isArray(arrCandidates[j])) return arrCandidates[j].length;
    }

    return null;
  }

  function pickCommentsCount(item){
    var candidates = [
      item && item.commentsCount,
      item && item.commentCount,
      item && item.totalComments,
      item && item.nbComments,
      item && item.comments_count,
      item && item.comment_count
    ];

    for (var i = 0; i < candidates.length; i++) {
      var n = toNumber(candidates[i]);
      if (n !== null) return n;
    }

    var arrCandidates = [
      item && item.comments,
      item && item.commentList,
      item && item.allComments
    ];

    for (var j = 0; j < arrCandidates.length; j++) {
      if (Array.isArray(arrCandidates[j])) return arrCandidates[j].length;
    }

    return null;
  }

  function pickVotesCount(item){
    // votes_a + votes_b sont déjà calculés côté serveur dans la liste
    if (item && (item.votes_a !== undefined || item.votes_b !== undefined)) {
      return Number(item.votes_a || 0) + Number(item.votes_b || 0);
    }

    var candidates = [
      item && item.vote_count,
      item && item.votesCount,
      item && item.voteCount,
      item && item.totalVotes,
      item && item.votes_count,
      item && item.total_votes,
      item && item.nbVoix,
      item && item.nbVotes
    ];

    for (var i = 0; i < candidates.length; i++) {
      var n = toNumber(candidates[i]);
      if (n !== null) return n;
    }

    // Calculer depuis les tableaux d'arguments (page détail)
    var arrCandidates = [
      item && item.optionA,
      item && item.optionB,
      item && item.arguments,
      item && item.ideas,
      item && item.allArguments,
      item && item.argumentList
    ];

    var total = 0;
    var found = false;
    for (var j = 0; j < arrCandidates.length; j++) {
      if (Array.isArray(arrCandidates[j])) {
        arrCandidates[j].forEach(function(arg){
          var v = toNumber(arg && arg.votes);
          if (v !== null) { total += v; found = true; }
        });
      }
    }
    return found ? total : null;
  }

  function storeDebateMeta(item){
    if (!item || typeof item !== 'object') return;
    var id = item.id || item._id || item.slug || item.debateId;
    if (id === undefined || id === null) return;

    var existing = debateMetaById.get(String(id)) || {};
    var newVotes = pickVotesCount(item);

    debateMetaById.set(String(id), {
      ideasCount: pickIdeasCount(item) !== null ? pickIdeasCount(item) : (existing.ideasCount || null),
      commentsCount: pickCommentsCount(item) !== null ? pickCommentsCount(item) : (existing.commentsCount || null),
      votesCount: newVotes !== null ? newVotes : (existing.votesCount || null)
    });
  }

  function walkPayload(payload){
    if (!payload) return;

    if (Array.isArray(payload)) {
      payload.forEach(walkPayload);
      return;
    }

    if (typeof payload !== 'object') return;

    var looksLikeDebate = (
      payload.id !== undefined ||
      payload._id !== undefined ||
      payload.slug !== undefined ||
      payload.debateId !== undefined
    ) && (
      payload.question !== undefined ||
      payload.title !== undefined ||
      payload.positionA !== undefined ||
      payload.positionB !== undefined ||
      payload.arguments !== undefined ||
      payload.comments !== undefined
    );

    if (looksLikeDebate) {
      storeDebateMeta(payload);
    }

    Object.keys(payload).forEach(function(key){
      walkPayload(payload[key]);
    });
  }

  var originalFetch = window.fetch;
  if (typeof originalFetch === 'function') {
    window.fetch = function(){
      return originalFetch.apply(this, arguments).then(function(response){
        try {
          var clone = response.clone();
          var contentType = (clone.headers && clone.headers.get && clone.headers.get('content-type')) || '';
          if (contentType.indexOf('application/json') !== -1) {
            clone.json().then(function(data){
              walkPayload(data);
              document.dispatchEvent(new CustomEvent('agon:index-meta-updated'));
            }).catch(function(){});
          }
        } catch (err) {}
        return response;
      });
    };
  }
})();
</script>

<script>
(function(){
  var labels = {
    copy:'Copier le lien', qrcode:'QR Code', x:'X', facebook:'Facebook',
    whatsapp:'WhatsApp', email:'Email', linkedin:'LinkedIn', mastodon:'Mastodon', reddit:'Reddit'
  };

  var activeDropdown = null;
  var activeButton = null;
  var _indexShareScrolling = false;
  var _touchStartY = 0;

  function closeAllDropdowns(){
    document.querySelectorAll('.index-share-dropdown.open').forEach(function(d){
      d.classList.remove('open');
      d.style.visibility = '';
    });
    activeDropdown = null;
    activeButton = null;
    _indexShareScrolling = false;
  }

  function positionDropdown(btn, dd){
    var rect = btn.getBoundingClientRect();
    var spacing = 8;

    dd.style.visibility = 'hidden';
    dd.classList.add('open');

    var menuRect = dd.getBoundingClientRect();
    var left = rect.left + (rect.width / 2) - (menuRect.width / 2);
    var top = rect.top - menuRect.height - spacing;

    if (left < spacing) left = spacing;
    if (left + menuRect.width > window.innerWidth - spacing) {
      left = window.innerWidth - menuRect.width - spacing;
    }

    if (top < spacing) {
      top = rect.bottom + spacing;
    }

    if (top + menuRect.height > window.innerHeight - spacing) {
      top = Math.max(spacing, window.innerHeight - menuRect.height - spacing);
    }

    dd.style.left = left + 'px';
    dd.style.top = top + 'px';
    dd.style.bottom = 'auto';
    dd.style.transform = 'none';
    dd.style.visibility = 'visible';
  }

  // Si le menu dépasse du viewport, scrolle pour le dégager puis repositionne
  function scrollToFit(btn, dd){
    var menuRect = dd.getBoundingClientRect();
    var spacing = 8;
    var overflowBottom = menuRect.bottom - (window.innerHeight - spacing);
    var overflowTop = spacing - menuRect.top;
    var scrollAmount = 0;

    if (overflowBottom > 0) scrollAmount = overflowBottom;       // scroll vers le bas
    else if (overflowTop > 0) scrollAmount = -overflowTop;       // scroll vers le haut

    if (scrollAmount === 0) return;

    _indexShareScrolling = true;
    window.scrollBy({ top: scrollAmount, behavior: 'smooth' });
    setTimeout(function(){
      positionDropdown(btn, dd); // repositionne après que le trigger ait bougé
      _indexShareScrolling = false;
    }, 400);
  }

  function toggleDropdown(btn, dd){
    var isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (isOpen) return;
    positionDropdown(btn, dd);
    activeDropdown = dd;
    activeButton = btn;

    // Scroll-to-fit après rendu
    requestAnimationFrame(function(){
      scrollToFit(btn, dd);
    });
  }

  function triggerOriginalShareButton(ob){
    if (!ob || typeof ob.dispatchEvent !== 'function') return false;

    var event = new MouseEvent('click', {
      bubbles: true,
      cancelable: true,
      view: window
    });

    return ob.dispatchEvent(event);
  }

  function getActionFromButton(ob){
    if (!ob) return null;

    var classList = Array.from(ob.classList || []);
    var supported = ['copy', 'qrcode', 'x', 'facebook', 'whatsapp', 'email', 'linkedin', 'mastodon', 'reddit'];
    var hasSupportedClass = supported.some(function(name){
      return classList.indexOf(name) !== -1;
    });

    if (!hasSupportedClass) return null;

    return function(){
      triggerOriginalShareButton(ob);
    };
  }

  function transform(block){
    if(block.getAttribute('data-share-transformed')) return;
    var btns = Array.from(block.querySelectorAll('.share-icon-button'));
    if(!btns.length) return;
    block.setAttribute('data-share-transformed','1');

    btns.forEach(function(b){ b.style.display='none'; });

    var btn = document.createElement('button');
    btn.className = 'index-share-btn';
    btn.type = 'button';
    btn.innerHTML = '<i class="fa-solid fa-share-nodes"></i> Partager';

    var dd = document.createElement('div');
    dd.className = 'index-share-dropdown';

    btns.forEach(function(ob){
      var cls = Array.from(ob.classList).find(function(c){ return labels[c]; }) || '';
      var icon = ob.querySelector('i');
      var action = getActionFromButton(ob);
      var item = document.createElement('button');
      item.className = 'isd-item';
      item.type = 'button';
      if(icon) item.appendChild(icon.cloneNode(true));
      var span = document.createElement('span');
      span.textContent = labels[cls] || ob.title || cls;
      item.appendChild(span);

      if (!action) {
        item.disabled = true;
        item.style.opacity = '0.5';
        item.style.cursor = 'not-allowed';
      } else {
        item.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          closeAllDropdowns();
          action();
        });
      }

      dd.appendChild(item);
    });

    dd.addEventListener('click', function(e){
      e.stopPropagation();
    });

    btn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      toggleDropdown(btn, dd);
    });

    block.appendChild(btn);
    document.body.appendChild(dd);
  }

  function scan(){
    document.querySelectorAll('.debate-card-share-actions:not([data-share-transformed])').forEach(transform);
  }

  document.addEventListener('click', function(){
    closeAllDropdowns();
  });

  window.addEventListener('resize', function(){
    if (activeDropdown && activeButton) {
      positionDropdown(activeButton, activeDropdown);
    }
  });

  // Fermeture au scroll (ignore les scrolls programmatiques d'ouverture)
  window.addEventListener('scroll', function(){
    if (_indexShareScrolling) return;
    if (activeDropdown) closeAllDropdowns();
  }, { passive: true, capture: true });

  // Fermeture au scroll tactile uniquement si déplacement > 10px (évite les faux positifs au tap)
  window.addEventListener('touchstart', function(e){
    _touchStartY = e.touches[0] ? e.touches[0].clientY : 0;
  }, { passive: true });

  window.addEventListener('touchmove', function(e){
    if (_indexShareScrolling) return;
    if (!activeDropdown) return;
    var deltaY = Math.abs((e.touches[0] ? e.touches[0].clientY : 0) - _touchStartY);
    if (deltaY > 10) closeAllDropdowns();
  }, { passive: true });

  var tries = 0;
  var interval = setInterval(function(){
    scan();
    tries++;
    if(tries > 60) clearInterval(interval);
  }, 300);

  new MutationObserver(scan).observe(document.body, { childList:true, subtree:true });
})();</script>

<script>
(function(){
  function pluralize(count, singular, plural){
    return count + ' ' + (count > 1 ? plural : singular);
  }

  function getDebateIdFromCard(card){
    var link = card.querySelector('a[href*="/debate/"]');
    if (!link) return null;
    var match = link.getAttribute('href').match(/\/debate\/([^/?#]+)/);
    return match ? decodeURIComponent(match[1]) : null;
  }

  function findMetaContainer(card){
    return card.querySelector('.debate-card-meta-below-media');
  }

  function ensureStatsRow(card){
    var meta = findMetaContainer(card);
    if (!meta) {
      meta = document.createElement('div');
      meta.className = 'debate-card-meta-below-media';
      var actions = card.querySelector('.debate-card-actions');
      if (actions && actions.parentNode === card) {
        card.insertBefore(meta, actions);
      } else {
        card.appendChild(meta);
      }
    }

    var row = meta.querySelector('.debate-card-stats-row');
    if (!row) {
      row = document.createElement('div');
      row.className = 'debate-card-stats-row';

      var ideas = meta.querySelector('.debate-card-ideas-count');
      if (!ideas) {
        ideas = document.createElement('p');
        ideas.className = 'debate-card-ideas-count';
        row.appendChild(ideas);
      } else {
        row.appendChild(ideas);
      }

      var comments = meta.querySelector('.debate-card-comments-count');
      if (!comments) {
        comments = document.createElement('p');
        comments.className = 'debate-card-comments-count';
        row.appendChild(comments);
      } else {
        row.appendChild(comments);
      }

      var votes = meta.querySelector('.debate-card-votes-count');
      if (!votes) {
        votes = document.createElement('p');
        votes.className = 'debate-card-votes-count';
        votes.style.display = 'none';
        row.appendChild(votes);
      } else {
        row.appendChild(votes);
      }

      meta.insertBefore(row, meta.firstChild);
    }

    return row;
  }

  function applyCounts(card){
    var id = getDebateIdFromCard(card);
    if (!id || !window.__agonIndexDebateMeta) return;
    var data = window.__agonIndexDebateMeta.get(String(id));
    if (!data) return;

    var row = ensureStatsRow(card);
    var ideasEl = row.querySelector('.debate-card-ideas-count');
    var commentsEl = row.querySelector('.debate-card-comments-count');
    var votesEl = row.querySelector('.debate-card-votes-count');

    if (ideasEl && data.ideasCount !== null && data.ideasCount !== undefined) {
      ideasEl.textContent = pluralize(data.ideasCount, 'idée', 'idées');
    }

    if (commentsEl && data.commentsCount !== null && data.commentsCount !== undefined) {
      commentsEl.textContent = pluralize(data.commentsCount, 'commentaire', 'commentaires');
      commentsEl.style.display = '';
    } else if (commentsEl) {
      commentsEl.style.display = 'none';
    }

    if (votesEl && data.votesCount !== null && data.votesCount !== undefined) {
      votesEl.textContent = pluralize(data.votesCount, 'voix', 'voix');
      votesEl.style.display = '';
    } else if (votesEl) {
      votesEl.style.display = 'none';
    }
  }

  function scanCards(){
    document.querySelectorAll('.debate-card').forEach(applyCounts);
  }

  var tries = 0;
  var interval = setInterval(function(){
    scanCards();
    tries += 1;
    if (tries > 80) clearInterval(interval);
  }, 300);

  document.addEventListener('agon:index-meta-updated', scanCards);
  new MutationObserver(scanCards).observe(document.body, { childList: true, subtree: true });
})();
</script>

</body>
</html>
