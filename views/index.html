<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Agôn — l'arène des idées. Réseau social européen</title>

  <meta name="description" content="Agôn est un réseau social européen où chacun peut partager, confronter et faire émerger les idées les plus convaincantes.">
  <meta property="og:site_name" content="Agôn">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Agôn — l'arène des idées">
  <meta property="og:description" content="Agôn est un réseau social européen où chacun peut partager, confronter et faire émerger les idées les plus convaincantes.">
  <meta property="og:url" content="/">
  <meta property="og:image" content="/logo2.jpeg">
  <meta property="og:image:alt" content="Agôn — l'arène des idées">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Agôn — l'arène des idées">
  <meta name="twitter:description" content="Agôn est un réseau social européen où chacun peut partager, confronter et faire émerger les idées les plus convaincantes.">
  <meta name="twitter:image" content="/logo2.jpeg">

  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="page-home page-home-mobile">


<header class="topbar">
  <div class="container topbar-inner topbar-home">

    <div class="home-brand-block">
      <button id="admin-login-btn" class="admin-icon" type="button" title="Mode admin">
        <i class="fa-solid fa-gear"></i>
      </button>

    <div class="home-brand-main">
  <img src="/logo.jpeg" alt="Logo Agôn" class="home-logo">
  <span class="brand-divider" aria-hidden="true"></span>

  <p class="topbar-message">
    <strong>La&nbsp;vraie&nbsp;gloire</strong><br>
    <strong>est&nbsp;convaincre.</strong>
  </p>
</div>
    </div>

<div class="topbar-social">
  <button class="share-icon-button" type="button" onclick="window.copyDebateLink()" title="Copier le lien">
    <i class="fa-solid fa-link"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareOnX()" title="Partager sur X">
    <i class="fa-brands fa-x-twitter"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareOnFacebook()" title="Partager sur Facebook">
    <i class="fa-brands fa-facebook-f"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareOnWhatsApp()" title="Partager sur WhatsApp">
    <i class="fa-brands fa-whatsapp"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareByEmail()" title="Partager par mail">
    <i class="fa-solid fa-envelope"></i>
  </button>
</div>


    <div class="topbar-actions">
      <div class="back-notifications-stack">
<div id="global-share-bar"></div>

        <div class="admin-controls-row" data-admin style="display:none;">
          <span id="admin-badge" class="admin-badge">Mode admin activé</span>

          <button id="admin-logout-btn" class="button admin-exit-btn" type="button">
            Quitter le mode admin
          </button>

          <a class="button button-secondary admin-reports-button" href="/admin-reports" data-admin style="display:none;">
            Signalements
            <span id="reports-count" class="notifications-count" style="display:none;"></span>
          </a>
        </div>
      </div>
    </div>

  </div>
</header>
<main class="container home-page">

  <section class="debates-section">

    <div class="index-explorer-topbar">
      <button
        type="button"
        id="index-sort-toggle"
        class="index-sort-toggle"
        aria-label="Afficher les filtres de tri et de recherche"
        aria-controls="index-explorer-controls"
        aria-expanded="false"
        onclick="toggleIndexSortControls(event)"
      >
        <i class="fa-solid fa-sliders"></i>
        <span>Trier</span>
      </button>
    </div>

    <div id="index-explorer-controls" class="index-explorer-controls" style="display:none;">
      <div class="search-box">
        <input
          id="debate-search"
          type="text"
          placeholder="Découvrir une arène ouverte..."
          autocomplete="off"
        >
      </div>

      <div class="debate-type-filter">
        <button onclick="setTypeFilter('all')" id="filter-all">Tous</button>
        <button onclick="setTypeFilter('debate')" id="filter-debate">Arènes à positions</button>
        <button onclick="setTypeFilter('question')" id="filter-question">Arènes libres</button>
        <button onclick="setTypeFilter('visited')" id="filter-visited">Arènes consultées</button>
      </div>

      <div id="theme-filter-slot"></div>
    </div>

<div id="visited-section-header" class="section-header section-header-home" style="display:none;">
  <div>
    <h3>Arènes visitées</h3>
  </div>
</div>

<section id="visited-debates-section" class="debates-subsection" style="display:none;">
  <section id="visited-debates-list" class="debates-list"></section>
</section>

<div id="other-section-header" class="section-header section-header-home" style="display:none;">
  <div>
    <h3>Autres arènes ouvertes</h3>
  </div>
</div>

<section id="debates-list" class="debates-list"></section>

  </section>

</main>


<nav class="home-bottom-nav" aria-label="Navigation principale mobile">
  <button
    type="button"
    id="index-explorer-toggle"
    class="home-bottom-nav-item"
    aria-label="Explorer"
    aria-controls="index-explorer-controls"
    aria-expanded="false"
    onclick="toggleIndexExplorerControls(event)"
  >
    <i class="fa-regular fa-compass"></i>
    <span>Explorer</span>
  </button>

  <a href="/create" class="home-bottom-nav-item" aria-label="Ouvrir une arène">
    <i class="fa-solid fa-plus"></i>
    <span>Créer</span>
  </a>

  <div class="home-bottom-nav-item-wrap">
    <button
      type="button"
      class="home-bottom-nav-item"
      aria-label="Partager"
      aria-haspopup="true"
      aria-expanded="false"
      onclick="toggleHomeBottomShareMenu(event)"
    >
      <i class="fa-solid fa-share-nodes"></i>
      <span>Partager</span>
    </button>

    <div
      id="home-bottom-share-menu"
      class="home-bottom-share-menu"
      onclick="event.stopPropagation()"
      aria-label="Options de partage"
    >
      <button type="button" onclick="handleHomeBottomShareAction(event, copyDebateLink)">
        <i class="fa-solid fa-link"></i>
        <span>Copier le lien</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareOnX)">
        <i class="fa-brands fa-x-twitter"></i>
        <span>X</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareOnFacebook)">
        <i class="fa-brands fa-facebook-f"></i>
        <span>Facebook</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareOnWhatsApp)">
        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp</span>
      </button>

      <button type="button" onclick="handleHomeBottomShareAction(event, shareByEmail)">
        <i class="fa-solid fa-envelope"></i>
        <span>Email</span>
      </button>
    </div>
  </div>

  <a href="/notifications" id="notifications-bell-bottom" class="home-bottom-nav-item home-bottom-nav-item-notifications" aria-label="Notifications">
    <i class="fa-regular fa-bell"></i>
    <span>Alertes</span>
    <span id="notifications-count-bottom" class="notifications-count notifications-count-bottom" style="display:none;"></span>
  </a>
</nav>


<script src="/script.js?v=20260404-2"></script>
</body>
</html>
