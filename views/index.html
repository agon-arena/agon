<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Agôn — l'arène des idées</title>

  <meta name="description" content="Agôn est une plateforme de consultation en ligne entièrement gratuite. Elle permet de partager, confronter et faire émerger les idées les plus convaincantes.">

  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="page-home page-home-mobile">


<header class="topbar">
  <div class="container topbar-inner topbar-home">

    <div class="home-brand-block">
      <button id="admin-login-btn" class="admin-icon" type="button" title="Mode admin">
        <i class="fa-solid fa-gear"></i>
      </button>

      <img src="/logo.jpeg" alt="Logo Agôn" class="home-logo">
    </div>

<div class="topbar-social">
  <button class="share-icon-button" type="button" onclick="window.copyDebateLink()" title="Copier le lien">
    <i class="fa-solid fa-link"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareOnX()" title="Partager sur X">
    <i class="fa-brands fa-x-twitter"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareOnFacebook()" title="Partager sur Facebook">
    <i class="fa-brands fa-facebook-f"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareOnWhatsApp()" title="Partager sur WhatsApp">
    <i class="fa-brands fa-whatsapp"></i>
  </button>

  <button class="share-icon-button" type="button" onclick="window.shareByEmail()" title="Partager par mail">
    <i class="fa-solid fa-envelope"></i>
  </button>
</div>


    <div class="topbar-actions">
      <div class="back-notifications-stack">
        <a href="/create" class="button" id="open-arena-button">Ouvrir une arène</a>

        <div id="global-share-bar"></div>

        <a id="notifications-bell" class="notifications-button notifications-link notifications-button-large" href="/notifications">
          🔔
          <span id="notifications-count" class="notifications-count" style="display:none;"></span>
        </a>

        <div class="admin-controls-row" data-admin style="display:none;">
          <span id="admin-badge" class="admin-badge">Mode admin activé</span>

          <button id="admin-logout-btn" class="button admin-exit-btn" type="button">
            Quitter le mode admin
          </button>

          <a class="button button-secondary admin-reports-button" href="/admin-reports" data-admin style="display:none;">
            Signalements
            <span id="reports-count" class="notifications-count" style="display:none;"></span>
          </a>
        </div>
      </div>
    </div>

  </div>
</header>
<main class="container home-page">

  <section class="debates-section">

    <div class="search-box">
      <input
        id="debate-search"
        type="text"
        placeholder="Découvrir une arène ouverte..."
        autocomplete="off"
      >
    </div>

    <div class="debate-type-filter">
      <button onclick="setTypeFilter('all')" id="filter-all">Tous</button>
      <button onclick="setTypeFilter('debate')" id="filter-debate">Débats</button>
      <button onclick="setTypeFilter('question')" id="filter-question">Questions ouvertes</button>
    </div>

    <div class="section-header section-header-home">
      <div>
        <h3>Arènes visitées</h3>
      </div>
    </div>

    <section id="visited-debates-section" class="debates-subsection" style="display:none;">
      <section id="visited-debates-list" class="debates-list"></section>
    </section>

    <div class="section-header section-header-home">
      <div>
        <h3>Autres arènes ouvertes</h3>
      </div>
    </div>

    <section id="debates-list" class="debates-list"></section>

  </section>

</main>

<script src="/script.js"></script>
</body>
</html>
